<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1f2937">
    <title>Market Intelligence</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icons/stock.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/terminal.css">
</head>

<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans overflow-hidden">

    <header class="h-16 bg-gray-800 border-b border-gray-700 flex justify-between items-center px-4 z-50 sticky top-0 shrink-0">
        <div class="flex items-center gap-3">
            <button id="btn-toggle-filters" class="p-2 text-gray-400 hover:text-white transition-colors cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>
            </button>
            <h1 class="font-bold text-lg bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tight">
                Pragmatic Intel
            </h1>
        </div>
        <div class="flex items-center gap-2 bg-gray-900/50 px-3 py-1 rounded-full border border-gray-700">
            <span class="text-[9px] font-black text-gray-500 uppercase tracking-tighter">Live Terminal</span>
            <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)] transition-colors duration-500"></div>
        </div>
    </header>

    <main class="flex-1 relative flex overflow-hidden">
        
        <aside id="sidebar-filters" class="slide-panel slide-panel-left absolute inset-y-0 left-0 w-72 bg-gray-800 border-r border-gray-700 p-6 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em]">Filtri Radar</h2>
                <button id="btn-close-filters" class="text-gray-400 hover:text-white text-xl p-2">✕</button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase block mb-2">Ricerca Ticker</label>
                    <input type="text" id="search-ticker" placeholder="es. NVDA..." class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
        </aside>

        <section id="main-feed" class="flex-1 h-full overflow-y-auto no-scrollbar bg-gray-900">
            <div class="max-w-2xl mx-auto p-4 sm:p-8 pb-32">
                <div class="flex items-center justify-between mb-8 border-b border-gray-800 pb-4">
                    <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em]">Market Intel Stream</h3>
                    <span class="text-[10px] text-gray-600 font-mono">2026-03-06</span>
                </div>
                
                <div id="feed-container" class="space-y-6">
                    <div class="text-center py-20">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-4"></div>
                        <p class="text-gray-600 text-sm font-medium tracking-wide">Sincronizzazione segnali in corso...</p>
                    </div>
                </div>
            </div>
        </section>

        <aside id="asset-control-panel" class="slide-panel slide-panel-right absolute inset-y-0 right-0 w-full sm:w-[450px] bg-gray-800 border-l border-gray-700 shadow-2xl flex flex-col">
            <div class="p-5 border-b border-gray-700 flex justify-between items-center bg-gray-800/50 backdrop-blur-md">
                <h2 id="panel-ticker" class="text-3xl font-black text-blue-400 tracking-tighter">--</h2>
                <button id="btn-close-panel" class="w-10 h-10 flex items-center justify-center bg-gray-700 hover:bg-gray-600 rounded-full transition-colors">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-8 no-scrollbar">
                <p id="panel-summary" class="text-sm text-gray-300 leading-relaxed italic"></p>
            </div>
        </aside>

        <div id="overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 hidden transition-opacity duration-300"></div>

    </main>
    
    <template id="template-card">
        <div class="card-terminal bg-gray-800 border-l-4 p-4 mb-4 shadow-lg rounded-xl transition-all">
            <div class="flex items-center gap-2 mb-2">
                <span class="badge-type text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-tighter"></span>
            </div>
            <h4 class="card-title font-bold text-sm mb-1 text-white"></h4>
            <p class="card-summary text-xs text-gray-400 mb-4 leading-relaxed line-clamp-3"></p>
            <div class="card-assets flex flex-wrap gap-2"></div>
        </div>
    </template>
    
    <template id="template-chip">
        <button class="bg-gray-700 hover:bg-gray-600 text-[10px] px-2 py-1 rounded border border-gray-600 font-bold transition-all cursor-pointer shrink-0"></button>
    </template>

    <script src="js/db.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
</body>
</html>
