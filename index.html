<!DOCTYPE html>
<html lang="it">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1f2937">
    <title>Pragmatic Intel - Terminal</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icons/stock.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async></script>
    
    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/terminal.css">
</head>


<body class="bg-gray-900 text-white h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-gray-800 p-3 shadow-md flex justify-between items-center z-20 border-b border-gray-700 relative">
        <div class="flex items-center gap-3">
            <button id="btn-toggle-filters" class="text-gray-400 hover:text-white p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                Pragmatic Intel
            </h1>
        </div>
        <div class="flex items-center gap-2">
            <span id="mt5-status" class="text-[10px] text-gray-500 uppercase font-bold tracking-wider hidden sm:block">MT5 Offline</span>
            <div id="status-indicator" class="w-2 h-2 bg-red-500 rounded-full" title="DB Disconnesso"></div>
        </div>
    </header>

    <main class="flex-1 flex relative overflow-hidden">
        
        <aside id="sidebar-filters" class="slide-panel absolute inset-y-0 left-0 w-64 bg-gray-800 border-r border-gray-700 p-5 -translate-x-full">
            <h2 class="text-xs font-bold text-gray-500 uppercase mb-6">Filtri</h2>
            </aside>

        <section id="main-feed" class="flex-1 h-full overflow-y-auto bg-gray-900 no-scrollbar">
            <div id="feed-container" class="max-w-xl mx-auto p-4 space-y-4 pb-20">
                </div>
        </section>

        <aside id="asset-control-panel" class="slide-panel absolute inset-y-0 right-0 w-full sm:w-80 bg-gray-800 border-l border-gray-700 p-5 translate-x-full">
            </aside>

        <div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden"></div>

    </main>

        <div id="overlay" class="hidden absolute inset-0 bg-black bg-opacity-50 z-20 sm:hidden"></div>

        <section id="main-feed" class="flex-1 overflow-y-auto p-3 pb-safe bg-gray-900 no-scrollbar">
            
            <h3 class="text-xs font-bold text-gray-500 uppercase mb-3 sticky top-0 bg-gray-900 py-1 z-10">Ultime 24 Ore</h3>
            
            <div id="feed-container" class="space-y-4">
                <p class="text-gray-500 text-sm text-center mt-10">In attesa di segnali Macro...</p>
                
                </div>
        </section>

        <aside id="asset-control-panel" class="slide-panel-right absolute inset-y-0 right-0 w-full sm:w-80 bg-gray-900 border-l border-gray-700 z-30 flex flex-col shadow-2xl">
            <div class="bg-gray-800 p-3 flex justify-between items-center border-b border-gray-700">
                <h2 id="panel-ticker" class="text-xl font-bold text-blue-400">--</h2>
                <button id="btn-close-panel" class="text-gray-400 hover:text-white p-1 bg-gray-700 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-5 no-scrollbar">
                
                <div class="flex justify-between items-center bg-gray-800 p-3 rounded-lg border border-gray-700">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Consenso Totale</p>
                        <p id="panel-consensus" class="text-lg font-bold text-emerald-400">BULLISH</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Confidenza</p>
                        <p id="panel-confidence" class="text-lg font-bold text-white">8.5<span class="text-xs text-gray-400">/10</span></p>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-gray-800 p-2 rounded border border-gray-700">
                        <p class="text-[10px] text-gray-500 uppercase">Breve</p>
                        <p id="panel-short" class="font-bold text-sm text-emerald-400">BUY</p>
                    </div>
                    <div class="bg-gray-800 p-2 rounded border border-gray-700">
                        <p class="text-[10px] text-gray-500 uppercase">Medio</p>
                        <p id="panel-medium" class="font-bold text-sm text-emerald-400">BUY</p>
                    </div>
                    <div class="bg-gray-800 p-2 rounded border border-gray-700">
                        <p class="text-[10px] text-gray-500 uppercase">Lungo</p>
                        <p id="panel-long" class="font-bold text-sm text-gray-400">HOLD</p>
                    </div>
                </div>

                <div>
                    <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-1 border-b border-gray-700 pb-1">Executive Summary AI</h3>
                    <p id="panel-summary" class="text-sm text-gray-300 leading-relaxed italic">
                        In attesa di dati per calcolare la sintesi...
                    </p>
                </div>

                <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2 shadow-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Live MT5 Check
                </button>

            </div>
        </aside>

    </main>

    <script src="js/db.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
