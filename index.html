<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pragmatic Finance | Worldy Style</title>
    <link rel="stylesheet" href="css/style.css">

<body class="bg-[#f8f9fa] text-[#1a1a1a] flex flex-col font-sans overflow-x-hidden">

            <div class="flex items-baseline gap-1">
                <span class="text-xl font-[900] tracking-tighter text-black uppercase">Pragmatic <span class="text-[#007bff]">Finance</span></span>
                <span class="bg-[#ff923b] text-white text-[9px] font-black px-1.5 py-0.5 rounded-sm uppercase">Beta</span>

        </div>
        <div class="flex items-center gap-4">

    <nav class="bg-white border-b-2 border-[#007bff] overflow-x-auto no-scrollbar sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex items-center px-4 h-[50px] gap-6 whitespace-nowrap">

            <a href="#" class="nav-category">Business Stories</a>
            <a href="#" class="nav-category">Crypto</a>
            <a href="#" class="nav-category">Daily</a>
            <a href="#" class="nav-category">Economia</a>
            <a href="#" class="nav-category border-l border-gray-200 pl-6 text-[#007bff] font-black uppercase text-[10px]">High Conviction</a>
        </div>
    </nav>

    <main class="flex-1">
        <section id="main-feed" class="max-w-6xl mx-auto p-6 md:p-10">
            <div id="feed-container">
                </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
