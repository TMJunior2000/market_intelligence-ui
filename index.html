<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pragmatic Finance | Worldy Style</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async></script>
</head>
<body class="bg-[#f8f9fa] text-[#1a1a1a] flex flex-col font-sans overflow-x-hidden">

    <header class="h-[70px] bg-white border-b border-[#e9ecef] flex justify-between items-center px-6 z-50 shrink-0">
        <div class="flex items-baseline gap-1">
            <span class="text-xl font-[900] tracking-tighter text-black uppercase">Pragmatic <span class="text-[#007bff]">Finance</span></span>
            <span class="bg-[#ff923b] text-white text-[9px] font-black px-1.5 py-0.5 rounded-sm uppercase">Beta</span>
        </div>
        <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-md"></div>
    </header>

    <div id="nav-mount"></div>

    <main class="flex-1">
        <section id="main-feed" class="max-w-6xl mx-auto p-6 md:p-10">
            <div id="feed-container">
                </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
