<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Intelligence</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <div data-component="navbar"></div>

  <main class="page-container">
      
      <div id="dashboard-view">
        <div data-component="breaking-news"></div>
        <div data-component="weekly-digest"></div>
        <div data-component="macro-outlook"></div>
      </div>

      <div id="filtered-view" style="display: none;">
        <div class="section-header">
          <h2 class="section-title" id="active-filter-title">Risultati</h2>
          <span class="section-count" id="active-filter-count">0 insights</span>
        </div>
        <div class="feed-grid" id="filtered-grid"></div>
      </div>

      <div id="asset-view" style="display: none;">
          <button onclick="router.backToHome()" class="back-link" style="border:none; background:none; cursor:pointer; display:inline-flex; align-items:center; gap:8px; margin-bottom:32px; font-weight:600; color:var(--text-secondary); font-size:13px; text-transform:uppercase; letter-spacing:1px;">
              <i class="fas fa-arrow-left"></i> Torna al Feed principale
          </button>
          
          <section id="asset-hero"></section>

          <div class="section-header" style="margin-top: 48px;">
              <h2 class="section-title">Storico Analisi</h2>
              <span class="section-count" id="asset-count">0 insights</span>
          </div>

          <div class="feed-grid" id="asset-feed-grid"></div>
      </div>

  </main>

  <script src="js/config.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="js/asset.js"></script>
  <script src="js/nav-logic.js"></script>  
  <script src="js/feed.js"></script>
  <script src="js/components.js"></script>

</body>
</html>
